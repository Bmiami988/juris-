<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Lexi Chat - Uganda Legal AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1f2937;
      height: 100vh;
      overflow: hidden;
    }

    /* Main chat container - full screen */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      position: relative;
    }

    /* Simple header - minimal, no navigation */
    .chat-header-minimal {
      padding: 1rem 1.5rem;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo-minimal {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #0f172a;
    }

    .logo-minimal i {
      font-size: 1.4rem;
      color: #10b981;
    }

    .back-link {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #10b981;
    }

    /* Chat messages area - scrollable */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    .chat-messages::-webkit-scrollbar {
      width: 5px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    /* Message bubbles */
    .message-group {
      display: flex;
      flex-direction: column;
      animation: fadeSlideUp 0.3s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* User message - right aligned */
    .message-user {
      display: flex;
      justify-content: flex-end;
    }

    .message-user .bubble {
      background: #10b981;
      color: white;
      border-radius: 1.5rem;
      border-bottom-right-radius: 0.25rem;
      padding: 0.75rem 1.25rem;
      max-width: 75%;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Bot message - left aligned */
    .message-bot {
      display: flex;
      justify-content: flex-start;
    }

    .message-bot .bubble {
      background: #f3f4f6;
      color: #1f2937;
      border-radius: 1.5rem;
      border-bottom-left-radius: 0.25rem;
      padding: 0.75rem 1.25rem;
      max-width: 85%;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    /* Bot avatar */
    .bot-avatar {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .avatar-icon {
      width: 32px;
      height: 32px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar-icon i {
      font-size: 1rem;
      color: white;
    }

    .bot-content {
      flex: 1;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.75rem 1.25rem;
      background: #f3f4f6;
      border-radius: 1.5rem;
      border-bottom-left-radius: 0.25rem;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    /* Sources styling */
    .sources {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.7rem;
    }

    .source {
      background: #f9fafb;
      padding: 6px 10px;
      border-radius: 10px;
      margin-top: 6px;
      border-left: 3px solid #10b981;
    }

    .source b {
      color: #0f766e;
      font-size: 0.7rem;
    }

    .source small {
      color: #6b7280;
      font-size: 0.65rem;
    }

    /* Input area - clean and minimal */
    .chat-input-area {
      padding: 1rem 1.5rem 1.5rem;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 1.5rem;
      padding: 0.5rem 0.5rem 0.5rem 1.25rem;
      transition: all 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .input-wrapper:focus-within {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.6rem 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    .send-btn {
      background: #10b981;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: #059669;
      transform: scale(1.02);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-hint {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-top: 0.75rem;
      text-align: center;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .chat-messages {
        padding: 1rem;
      }
      
      .message-user .bubble,
      .message-bot .bubble {
        max-width: 90%;
      }
      
      .chat-header-minimal {
        padding: 0.75rem 1rem;
      }
      
      .chat-input-area {
        padding: 0.75rem 1rem 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- Minimal header - no navigation bar -->
    <div class="chat-header-minimal">
      <div class="logo-minimal">
        <i class="fas fa-gavel"></i>
        <span>Lexi</span>
      </div>
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Exit
      </a>
    </div>

    <!-- Chat messages area -->
    <div id="chat-messages" class="chat-messages"></div>

    <!-- Input area -->
    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="input" placeholder="Ask me anything about Ugandan law..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="input-hint">
        <i class="fas fa-keyboard"></i> Enter to send · Shift+Enter for new line
      </div>
    </div>
  </div>

  <script>
    (function() {
      const API_URL = "https://ug-legal-ai.fastapicloud.dev/ask";
      
      const chatMessages = document.getElementById("chat-messages");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      
      // Session management
      let session_id = localStorage.getItem("session_id");
      if (!session_id) {
        session_id = crypto.randomUUID().slice(0, 8);
        localStorage.setItem("session_id", session_id);
      }
      
      // Auto-resize textarea
      function autoResize() {
        if (input) {
          input.style.height = "auto";
          input.style.height = Math.min(input.scrollHeight, 120) + "px";
        }
      }
      
      // Add user message bubble
      function addUserMessage(text) {
        const messageGroup = document.createElement("div");
        messageGroup.className = "message-group";
        messageGroup.innerHTML = `
          <div class="message-user">
            <div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
          </div>
        `;
        chatMessages.appendChild(messageGroup);
        scrollToBottom();
        return messageGroup;
      }
      
      // Add bot message bubble with optional avatar
      function addBotMessage(text, isHtml = false) {
        const messageGroup = document.createElement("div");
        messageGroup.className = "message-group";
        
        const content = isHtml ? text : escapeHtml(text).replace(/\n/g, '<br>');
        
        messageGroup.innerHTML = `
          <div class="message-bot">
            <div class="bot-avatar">
              <div class="avatar-icon">
                <i class="fas fa-robot"></i>
              </div>
              <div class="bot-content">
                <div class="bubble">${content}</div>
              </div>
            </div>
          </div>
        `;
        chatMessages.appendChild(messageGroup);
        scrollToBottom();
        return messageGroup;
      }
      
      // Show typing animation
      let typingElement = null;
      function showTyping() {
        removeTyping();
        typingElement = document.createElement("div");
        typingElement.className = "message-group";
        typingElement.innerHTML = `
          <div class="message-bot">
            <div class="bot-avatar">
              <div class="avatar-icon">
                <i class="fas fa-robot"></i>
              </div>
              <div class="bot-content">
                <div class="typing-indicator">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>
        `;
        chatMessages.appendChild(typingElement);
        scrollToBottom();
      }
      
      function removeTyping() {
        if (typingElement && typingElement.remove) {
          typingElement.remove();
          typingElement = null;
        }
      }
      
      function scrollToBottom() {
        if (chatMessages) {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
      }
      
      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      
      // Format sources
      function formatSources(sources) {
        if (!sources || !Array.isArray(sources) || sources.length === 0) return "";
        
        let html = `<div class="sources"><i class="fas fa-database"></i> <strong>Sources:</strong>`;
        sources.forEach(src => {
          let sourceName = src.source || src.title || "Legal reference";
          let contentSnippet = src.content || src.text || "";
          if (contentSnippet.length > 150) contentSnippet = contentSnippet.substring(0, 150) + "…";
          html += `
            <div class="source">
              <b>📚 ${escapeHtml(sourceName)}</b><br/>
              <small>${escapeHtml(contentSnippet)}</small>
            </div>
          `;
        });
        html += `</div>`;
        return html;
      }
      
      // Send message to API
      async function sendMessage() {
        const question = input.value.trim();
        if (!question) return;
        
        // Disable input during send
        sendBtn.disabled = true;
        input.disabled = true;
        
        // Add user message to chat
        addUserMessage(question);
        
        // Clear input
        input.value = "";
        autoResize();
        
        // Show typing indicator
        showTyping();
        
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              question: question,
              session_id: session_id
            })
          });
          
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }
          
          const data = await response.json();
          removeTyping();
          
          // Bot response
          let botReply = data.response || "I'm sorry, I couldn't process that request.";
          addBotMessage(botReply);
          
          // Add sources if available
          if (data.sources && Array.isArray(data.sources) && data.sources.length > 0) {
            const sourcesHtml = formatSources(data.sources);
            addBotMessage(sourcesHtml, true);
          }
          
        } catch (err) {
          console.error("API Error:", err);
          removeTyping();
          
          let errorMsg = "⚠️ Connection error. Please check your network and try again.";
          if (err.message.includes("Failed to fetch")) {
            errorMsg = "⚠️ Cannot connect to the server. Please verify the API is running.";
          } else if (err.message) {
            errorMsg = `⚠️ Error: ${err.message}`;
          }
          addBotMessage(errorMsg);
        } finally {
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
          autoResize();
        }
      }
      
      // Event listeners
      if (input) {
        input.addEventListener("input", autoResize);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
      }
      
      if (sendBtn) {
        sendBtn.addEventListener("click", sendMessage);
      }
      
      // Welcome message
      function addWelcomeMessage() {
        const welcomeText = "👋 Hello! I'm Lexi, your AI legal assistant for Uganda. Ask me anything about Ugandan law, rights, legal procedures, or the Constitution. How can I help you today?";
        addBotMessage(welcomeText);
      }
      
      // Initialize chat
      if (chatMessages && chatMessages.children.length === 0) {
        addWelcomeMessage();
      }
      
      if (input) {
        input.focus();
      }
    })();
  </script>
</body>
</html>

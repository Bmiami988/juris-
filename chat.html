<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, height=device-height" />
  <title>Juris Chat - Uganda Legal AI Assistant</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310b981'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E⚖%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310b981'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E⚖%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      position: relative;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1f2937;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    /* Main chat container */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      background: #ffffff;
      position: relative;
    }

    /* Minimal header */
    .chat-header-minimal {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
      z-index: 10;
    }

    .logo-minimal {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #0f172a;
    }

    .logo-minimal i {
      font-size: 1.3rem;
      color: #10b981;
    }

    .back-link {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
      padding: 6px 12px;
      border-radius: 20px;
    }

    .back-link:active {
      background: #f3f4f6;
    }

    /* Chat messages area - takes remaining space */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    /* Message groups */
    .message-group {
      display: flex;
      flex-direction: column;
      animation: fadeSlideUp 0.3s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* User message */
    .message-user {
      display: flex;
      justify-content: flex-end;
    }

    .message-user .bubble {
      background: #10b981;
      color: white;
      border-radius: 20px;
      border-bottom-right-radius: 4px;
      padding: 10px 16px;
      max-width: 85%;
      font-size: 0.9rem;
      line-height: 1.45;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Bot message */
    .message-bot {
      display: flex;
      justify-content: flex-start;
    }

    .bot-avatar {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      max-width: 100%;
    }

    .avatar-icon {
      width: 32px;
      height: 32px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar-icon i {
      font-size: 1rem;
      color: white;
    }

    .bot-content {
      flex: 1;
      min-width: 0;
    }

    .message-bot .bubble {
      background: #f3f4f6;
      color: #1f2937;
      border-radius: 20px;
      border-bottom-left-radius: 4px;
      padding: 10px 16px;
      max-width: 100%;
      font-size: 0.9rem;
      line-height: 1.45;
      word-wrap: break-word;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #f3f4f6;
      border-radius: 20px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Sources styling */
    .sources {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.65rem;
    }

    .source {
      background: #f9fafb;
      padding: 6px 10px;
      border-radius: 10px;
      margin-top: 6px;
      border-left: 3px solid #10b981;
    }

    .source b {
      color: #0f766e;
      font-size: 0.65rem;
    }

    .source small {
      color: #6b7280;
      font-size: 0.6rem;
    }

    /* Input area - CRITICAL FIX for Samsung */
    .chat-input-area {
      padding: 12px 16px 20px 16px;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
      width: 100%;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      padding: 4px 6px 4px 18px;
      transition: all 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .input-wrapper:focus-within {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 44px;
      line-height: 1.4;
    }

    textarea::placeholder {
      color: #9ca3af;
      font-size: 0.9rem;
    }

    .send-btn {
      background: #10b981;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:active {
      background: #059669;
      transform: scale(0.98);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-hint {
      font-size: 0.65rem;
      color: #9ca3af;
      margin-top: 8px;
      text-align: center;
    }

    /* Safe area for notches */
    @supports (padding: max(0px)) {
      .chat-header-minimal {
        padding-top: max(12px, env(safe-area-inset-top));
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
      }
      
      .chat-input-area {
        padding-bottom: max(20px, env(safe-area-inset-bottom));
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
      }
    }

    /* Samsung and Android specific fixes */
    @media (max-width: 768px) {
      .chat-input-area {
        padding: 10px 12px 16px 12px;
      }
      
      textarea {
        font-size: 16px;
        min-height: 48px;
      }
      
      .send-btn {
        width: 48px;
        height: 48px;
      }
      
      .message-user .bubble,
      .bot-content .bubble {
        max-width: 90%;
      }
      
      .bot-avatar {
        gap: 8px;
      }
      
      .avatar-icon {
        width: 30px;
        height: 30px;
      }
    }

    /* Landscape mode */
    @media (max-width: 768px) and (orientation: landscape) {
      .chat-messages {
        padding: 10px;
        gap: 8px;
      }
      
      .chat-input-area {
        padding: 8px 12px 12px 12px;
      }
      
      textarea {
        min-height: 40px;
        padding: 8px 0;
      }
      
      .send-btn {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header-minimal">
      <div class="logo-minimal">
        <i class="fas fa-gavel"></i>
        <span>Juris</span>
      </div>
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Exit
      </a>
    </div>

    <div id="chat-messages" class="chat-messages"></div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="input" placeholder="Ask me anything about Ugandan law..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="input-hint">
        <i class="fas fa-keyboard"></i> Enter to send · Shift+Enter for new line
      </div>
    </div>
  </div>

  <script>
    (function() {
      const API_URL = "https://ug-legal-ai.fastapicloud.dev/ask";
      
      const chatMessages = document.getElementById("chat-messages");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      
      let session_id = localStorage.getItem("session_id");
      if (!session_id) {
        session_id = crypto.randomUUID().slice(0, 8);
        localStorage.setItem("session_id", session_id);
      }
      
      function autoResize() {
        if (input) {
          input.style.height = "auto";
          const newHeight = Math.min(input.scrollHeight, 100);
          input.style.height = newHeight + "px";
        }
      }
      
      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      
      function scrollToBottom() {
        setTimeout(() => {
          if (chatMessages) {
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }
        }, 50);
      }
      
      function addUserMessage(text) {
        const messageGroup = document.createElement("div");
        messageGroup.className = "message-group";
        messageGroup.innerHTML = `
          <div class="message-user">
            <div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
          </div>
        `;
        chatMessages.appendChild(messageGroup);
        scrollToBottom();
      }
      
      function addBotMessage(text, isHtml = false) {
        const messageGroup = document.createElement("div");
        messageGroup.className = "message-group";
        const content = isHtml ? text : escapeHtml(text).replace(/\n/g, '<br>');
        messageGroup.innerHTML = `
          <div class="message-bot">
            <div class="bot-avatar">
              <div class="avatar-icon">
                <i class="fas fa-robot"></i>
              </div>
              <div class="bot-content">
                <div class="bubble">${content}</div>
              </div>
            </div>
          </div>
        `;
        chatMessages.appendChild(messageGroup);
        scrollToBottom();
      }
      
      let typingElement = null;
      function showTyping() {
        removeTyping();
        typingElement = document.createElement("div");
        typingElement.className = "message-group";
        typingElement.innerHTML = `
          <div class="message-bot">
            <div class="bot-avatar">
              <div class="avatar-icon">
                <i class="fas fa-robot"></i>
              </div>
              <div class="bot-content">
                <div class="typing-indicator">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>
        `;
        chatMessages.appendChild(typingElement);
        scrollToBottom();
      }
      
      function removeTyping() {
        if (typingElement && typingElement.remove) {
          typingElement.remove();
          typingElement = null;
        }
      }
      
      function formatSources(sources) {
        if (!sources || !Array.isArray(sources) || sources.length === 0) return "";
        let html = `<div class="sources"><i class="fas fa-database"></i> <strong>Sources:</strong>`;
        sources.forEach(src => {
          let sourceName = src.source || src.title || "Legal reference";
          let contentSnippet = src.content || src.text || "";
          if (contentSnippet.length > 150) contentSnippet = contentSnippet.substring(0, 150) + "…";
          html += `
            <div class="source">
              <b>📚 ${escapeHtml(sourceName)}</b><br/>
              <small>${escapeHtml(contentSnippet)}</small>
            </div>
          `;
        });
        html += `</div>`;
        return html;
      }
      
      async function sendMessage() {
        const question = input.value.trim();
        if (!question) return;
        
        sendBtn.disabled = true;
        input.disabled = true;
        
        addUserMessage(question);
        input.value = "";
        autoResize();
        showTyping();
        
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              question: question,
              session_id: session_id
            })
          });
          
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          
          const data = await response.json();
          removeTyping();
          
          let botReply = data.response || "I'm sorry, I couldn't process that request.";
          addBotMessage(botReply);
          
          if (data.sources && Array.isArray(data.sources) && data.sources.length > 0) {
            const sourcesHtml = formatSources(data.sources);
            addBotMessage(sourcesHtml, true);
          }
          
        } catch (err) {
          console.error(err);
          removeTyping();
          let errorMsg = "⚠️ Connection error. Please check your network and try again.";
          addBotMessage(errorMsg);
        } finally {
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
          autoResize();
        }
      }
      
      input.addEventListener("input", autoResize);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      sendBtn.addEventListener("click", sendMessage);
      
      // Welcome message
      if (chatMessages.children.length === 0) {
        addBotMessage("👋 Hello! I'm Lexi, an AI legal Awareness assistant for Uganda. Ask me anything about Ugandan law, rights, legal procedures, or the Constitution. How can I help you today?");
      }
      
      input.focus();
      
      // Fix for mobile keyboard pushing content
      window.addEventListener('resize', function() {
        scrollToBottom();
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes" />
  <title>Juris Chat - Uganda Legal AI Assistant</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310b981'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='white' font-family='Arial'%3E⚖%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; position: relative; }
    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1f2937;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      background: #ffffff;
      position: relative;
    }
    .chat-header-minimal {
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
      z-index: 10;
    }
    .logo-minimal {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #0f172a;
    }
    .logo-minimal i { font-size: 1.3rem; color: #10b981; }
    .status-badge {
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 20px;
      background: #f3f4f6;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-badge.online { background: #d1fae5; color: #065f46; }
    .status-badge.offline { background: #fee2e2; color: #991b1b; }
    .back-link {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .message-group { animation: fadeSlideUp 0.3s ease-out; }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-user { display: flex; justify-content: flex-end; }
    .message-user .bubble {
      background: #10b981;
      color: white;
      border-radius: 20px;
      border-bottom-right-radius: 4px;
      padding: 10px 16px;
      max-width: 85%;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .message-bot { display: flex; justify-content: flex-start; }
    .bot-avatar { display: flex; align-items: flex-start; gap: 10px; max-width: 100%; }
    .avatar-icon {
      width: 32px;
      height: 32px;
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .avatar-icon i { font-size: 1rem; color: white; }
    .bot-content { flex: 1; min-width: 0; }
    .message-bot .bubble {
      background: #f3f4f6;
      color: #1f2937;
      border-radius: 20px;
      border-bottom-left-radius: 4px;
      padding: 10px 16px;
      max-width: 100%;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: #f3f4f6;
      border-radius: 20px;
      width: fit-content;
    }
    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    .sources {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.7rem;
    }
    .source {
      background: #f9fafb;
      padding: 8px 10px;
      border-radius: 10px;
      margin-top: 6px;
      border-left: 3px solid #10b981;
    }
    .source b { color: #0f766e; font-size: 0.7rem; display: block; margin-bottom: 4px; }
    .source small { color: #6b7280; font-size: 0.65rem; display: block; }
    .chat-input-area {
      padding: 12px 16px 20px 16px;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
      width: 100%;
    }
    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      padding: 4px 6px 4px 18px;
    }
    .input-wrapper:focus-within {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }
    textarea {
      flex: 1;
      border: none;
      background: transparent;
      padding: 12px 0;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      max-height: 100px;
      min-height: 44px;
    }
    .send-btn {
      background: #10b981;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-hint { font-size: 0.65rem; color: #9ca3af; margin-top: 8px; text-align: center; }
    @media (max-width: 768px) {
      .chat-input-area { padding: 10px 12px 16px 12px; }
      textarea { font-size: 16px; min-height: 48px; }
      .send-btn { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header-minimal">
      <div class="logo-minimal">
        <i class="fas fa-gavel"></i>
        <span>Juris</span>
      </div>
      <div id="statusBadge" class="status-badge">
        <i class="fas fa-circle"></i>
        <span>Connecting...</span>
      </div>
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Exit
      </a>
    </div>

    <div id="chat-messages" class="chat-messages"></div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="input" placeholder="Ask me anything about Ugandan law..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="input-hint">
        <i class="fas fa-keyboard"></i> Enter to send · Shift+Enter for new line
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ============================================
      // CRITICAL: Use your ACTUAL working API URL
      // ============================================
      const API_URL = "https://juris-ai.fastapicloud.dev/ask";
      
      // Test URL to verify connection
      const HEALTH_URL = "https://juris-ai.fastapicloud.dev/health";
      
      let session_id = localStorage.getItem("session_id");
      if (!session_id) {
        session_id = crypto.randomUUID().slice(0, 8);
        localStorage.setItem("session_id", session_id);
      }
      
      const chatMessages = document.getElementById("chat-messages");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      const statusBadge = document.getElementById("statusBadge");
      
      let isOnline = false;
      
      function updateStatus(status, online) {
        isOnline = online;
        if (statusBadge) {
          statusBadge.className = `status-badge ${online ? 'online' : 'offline'}`;
          const icon = statusBadge.querySelector('i');
          const textSpan = statusBadge.querySelector('span');
          if (icon) icon.className = online ? 'fas fa-circle' : 'fas fa-exclamation-triangle';
          if (textSpan) textSpan.textContent = status;
        }
      }
      
      async function testConnection() {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 5000);
          const response = await fetch(HEALTH_URL, { method: 'GET', signal: controller.signal });
          clearTimeout(timeoutId);
          
          if (response.ok) {
            updateStatus('Connected', true);
            console.log('✅ Connected to backend');
            return true;
          }
        } catch (err) {
          console.log('Connection test failed:', err.message);
        }
        updateStatus('Offline', false);
        return false;
      }
      
      function autoResize() {
        if (input) {
          input.style.height = "auto";
          input.style.height = Math.min(input.scrollHeight, 150) + "px";
        }
      }
      
      input?.addEventListener("input", autoResize);
      input?.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      sendBtn?.addEventListener("click", sendMessage);
      
      function appendMessage(text, sender, isHtml = false) {
        if (!chatMessages) return;
        const msg = document.createElement("div");
        msg.className = `message-group`;
        if (sender === 'user') {
          msg.innerHTML = `<div class="message-user"><div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div></div>`;
        } else {
          msg.innerHTML = `
            <div class="message-bot">
              <div class="bot-avatar">
                <div class="avatar-icon"><i class="fas fa-robot"></i></div>
                <div class="bot-content"><div class="bubble">${isHtml ? text : escapeHtml(text).replace(/\n/g, '<br>')}</div></div>
              </div>
            </div>`;
        }
        chatMessages.appendChild(msg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return msg;
      }
      
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
      }
      
      function formatSources(sources) {
        if (!sources || !Array.isArray(sources) || sources.length === 0) return "";
        let html = `<div class="sources"><i class="fas fa-database"></i> <strong>Legal References:</strong>`;
        sources.forEach(src => {
          let sourceName = src.act_name || src.source || src.title || "Legal reference";
          let section = src.section ? ` (${src.section})` : '';
          let contentSnippet = src.content_preview || src.content || src.text || "";
          if (contentSnippet.length > 150) contentSnippet = contentSnippet.substring(0, 150) + "…";
          let relevance = src.relevance_score ? ` · ${Math.round(src.relevance_score * 100)}% relevant` : '';
          html += `<div class="source"><b>📚 ${escapeHtml(sourceName)}${escapeHtml(section)}${relevance}</b><small>${escapeHtml(contentSnippet)}</small></div>`;
        });
        html += `</div>`;
        return html;
      }
      
      let typingElement = null;
      function showTyping() {
        removeTyping();
        if (!chatMessages) return;
        typingElement = document.createElement("div");
        typingElement.className = "message-group";
        typingElement.id = "typingIndicator";
        typingElement.innerHTML = `
          <div class="message-bot">
            <div class="bot-avatar">
              <div class="avatar-icon"><i class="fas fa-robot"></i></div>
              <div class="bot-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
            </div>
          </div>`;
        chatMessages.appendChild(typingElement);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
      
      function removeTyping() {
        if (typingElement && typingElement.remove) {
          typingElement.remove();
          typingElement = null;
        }
      }
      
      async function sendMessage() {
        const question = input.value.trim();
        if (!question) return;
        
        sendBtn.disabled = true;
        input.disabled = true;
        
        appendMessage(question, "user");
        input.value = "";
        autoResize();
        showTyping();
        
        try {
          // Test connection before sending
          const connected = await testConnection();
          if (!connected) {
            throw new Error("Cannot connect to the legal AI service. Please check your internet connection.");
          }
          
          console.log("Sending to:", API_URL);
          console.log("Question:", question);
          
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              question: question,
              session_id: session_id
            })
          });
          
          console.log("Response status:", response.status);
          
          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText.substring(0, 100)}`);
          }
          
          const data = await response.json();
          console.log("Response data:", data);
          
          removeTyping();
          
          // Display the main response
          let botReply = data.response || "I'm sorry, I couldn't process that request.";
          appendMessage(botReply, "bot");
          
          // Show confidence if available
          if (data.confidence_score) {
            const confidenceHtml = `<div style="font-size: 0.65rem; color: #6b7280; margin-top: 6px;"><i class="fas fa-chart-line"></i> Confidence: ${Math.round(data.confidence_score * 100)}%</div>`;
            const lastMsg = chatMessages.lastElementChild;
            if (lastMsg) {
              const bubble = lastMsg.querySelector('.bubble');
              if (bubble) bubble.innerHTML += confidenceHtml;
            }
          }
          
          // Show acts consulted
          if (data.acts_consulted && data.acts_consulted.length > 0) {
            const actsHtml = `<div style="margin-top: 8px; font-size: 0.7rem; color: #6b7280;"><i class="fas fa-book"></i> Acts: ${data.acts_consulted.join(', ')}</div>`;
            const lastMsg = chatMessages.lastElementChild;
            if (lastMsg) {
              const bubble = lastMsg.querySelector('.bubble');
              if (bubble) bubble.innerHTML += actsHtml;
            }
          }
          
          // Show sources
          if (data.sources && data.sources.length > 0) {
            const sourcesHtml = formatSources(data.sources);
            appendMessage(sourcesHtml, "bot", true);
          }
          
        } catch (err) {
          console.error("Error:", err);
          removeTyping();
          appendMessage(`⚠️ ${err.message || "An error occurred. Please try again."}`, "bot");
        } finally {
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
          autoResize();
        }
      }
      
      // Initialize
      testConnection();
      
      // Welcome message
      if (chatMessages && chatMessages.children.length === 0) {
        appendMessage("👋 **Hello! I'm Juris**, your AI legal assistant for Uganda.\n\nAsk me about:\n• Constitutional rights\n• Criminal law and penalties\n• Land and property\n• Employment law\n• Marriage and divorce\n• And more...\n\n**How can I help you today?**", "bot");
      }
      
      input?.focus();
      
      // Online/offline handling
      window.addEventListener('online', () => { testConnection(); appendMessage("✅ Connection restored!", "bot"); });
      window.addEventListener('offline', () => { updateStatus('Offline', false); appendMessage("⚠️ You are offline. Please check your connection.", "bot"); });
      
    })();
  </script>
</body>
</html>

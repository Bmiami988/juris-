<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Lexi Chat - Uganda Legal AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1f2937;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* Main chat container */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      background: #ffffff;
    }

    /* Minimal header */
    .chat-header-minimal {
      padding: clamp(0.75rem, 3vw, 1rem) clamp(1rem, 4vw, 1.5rem);
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
    }

    .logo-minimal {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 600;
      color: #0f172a;
    }

    .logo-minimal i {
      font-size: clamp(1.2rem, 5vw, 1.4rem);
      color: #10b981;
    }

    .back-link {
      color: #6b7280;
      text-decoration: none;
      font-size: clamp(0.75rem, 3vw, 0.85rem);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
      padding: 8px 12px;
      border-radius: 20px;
    }

    .back-link:hover {
      background: #f3f4f6;
      color: #10b981;
    }

    /* Chat messages area */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: clamp(1rem, 4vw, 1.5rem);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    /* Message groups */
    .message-group {
      display: flex;
      flex-direction: column;
      animation: fadeSlideUp 0.3s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* User message */
    .message-user {
      display: flex;
      justify-content: flex-end;
    }

    .message-user .bubble {
      background: #10b981;
      color: white;
      border-radius: 1.5rem;
      border-bottom-right-radius: 0.25rem;
      padding: clamp(0.6rem, 2.5vw, 0.75rem) clamp(1rem, 4vw, 1.25rem);
      max-width: 85%;
      font-size: clamp(0.875rem, 3.5vw, 0.95rem);
      line-height: 1.5;
      word-wrap: break-word;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Bot message */
    .message-bot {
      display: flex;
      justify-content: flex-start;
    }

    .bot-avatar {
      display: flex;
      align-items: flex-start;
      gap: clamp(8px, 3vw, 12px);
      max-width: 100%;
    }

    .avatar-icon {
      width: clamp(28px, 5vw, 32px);
      height: clamp(28px, 5vw, 32px);
      background: #10b981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .avatar-icon i {
      font-size: clamp(0.875rem, 3vw, 1rem);
      color: white;
    }

    .bot-content {
      flex: 1;
      min-width: 0;
    }

    .message-bot .bubble {
      background: #f3f4f6;
      color: #1f2937;
      border-radius: 1.5rem;
      border-bottom-left-radius: 0.25rem;
      padding: clamp(0.6rem, 2.5vw, 0.75rem) clamp(1rem, 4vw, 1.25rem);
      max-width: 100%;
      font-size: clamp(0.875rem, 3.5vw, 0.95rem);
      line-height: 1.5;
      word-wrap: break-word;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: clamp(0.6rem, 2.5vw, 0.75rem) clamp(1rem, 4vw, 1.25rem);
      background: #f3f4f6;
      border-radius: 1.5rem;
      border-bottom-left-radius: 0.25rem;
      width: fit-content;
    }

    .typing-indicator span {
      width: clamp(6px, 2vw, 8px);
      height: clamp(6px, 2vw, 8px);
      background: #9ca3af;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Sources styling */
    .sources {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #e5e7eb;
      font-size: clamp(0.65rem, 2.5vw, 0.7rem);
    }

    .source {
      background: #f9fafb;
      padding: 6px 10px;
      border-radius: 10px;
      margin-top: 6px;
      border-left: 3px solid #10b981;
    }

    .source b {
      color: #0f766e;
      font-size: clamp(0.65rem, 2.5vw, 0.7rem);
    }

    .source small {
      color: #6b7280;
      font-size: clamp(0.6rem, 2.3vw, 0.65rem);
    }

    /* Input area */
    .chat-input-area {
      padding: clamp(0.75rem, 3vw, 1rem) clamp(1rem, 4vw, 1.5rem) clamp(1rem, 4vw, 1.5rem);
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 1.5rem;
      padding: 0.25rem 0.25rem 0.25rem 1rem;
      transition: all 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .input-wrapper:focus-within {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.6rem 0;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.875rem, 3.5vw, 0.95rem);
      resize: none;
      outline: none;
      max-height: 100px;
      line-height: 1.4;
    }

    textarea::placeholder {
      color: #9ca3af;
    }

    .send-btn {
      background: #10b981;
      border: none;
      width: clamp(36px, 8vw, 40px);
      height: clamp(36px, 8vw, 40px);
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: #059669;
      transform: scale(1.02);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-hint {
      font-size: clamp(0.6rem, 2.5vw, 0.7rem);
      color: #9ca3af;
      margin-top: 0.6rem;
      text-align: center;
    }

    /* Safe area for notches */
    @supports (padding: max(0px)) {
      .chat-header-minimal {
        padding-top: max(0.75rem, env(safe-area-inset-top));
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
      }
      
      .chat-input-area {
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
      }
    }

    /* Landscape mode on phones */
    @media (max-width: 768px) and (orientation: landscape) {
      .chat-messages {
        padding: 0.75rem;
        gap: 0.75rem;
      }
      
      .message-user .bubble,
      .bot-content .bubble {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header-minimal">
      <div class="logo-minimal">
        <i class="fas fa-gavel"></i>
        <span>Lexi</span>
      </div>
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Exit
      </a>
    </div>

    <div id="chat-messages" class="chat-messages"></div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <textarea id="input" placeholder="Ask me anything about Ugandan law..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="input-hint">
        <i class="fas fa-keyboard"></i> Enter to send · Shift+Enter for new line
      </div>
    </div>
  </div>

  <script>
    (function() {
      const API_URL = "https://ug-legal-ai.fastapicloud.dev/ask";
      
      const chatMessages = document.getElementById("chat-messages");
      const input = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      
      let session_id = localStorage.getItem("session_id");
      if (!session_id) {
        session_id = crypto.randomUUID().slice(0, 8);
        localStorage.setItem("session_id", session_id);
      }
      
      function autoResize() {
        if (input) {
          input.style.height = "auto";
          input.style.height = Math.min(input.scrollHeight, 100) + "px";
        }
      }
      
      function escapeHtml(str) {
        if (!str) return "";
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }
      
      function scrollToBottom() {
        if (chatMessages) {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
      }
      
      function addUserMessage(text) {
        const messageGroup = document.createElement("div");
        messageGroup.className = "message-group";
        messageGroup.innerHTML = `
          <div class="message-user">
            <div class="bubble">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
          </div>
        `;
        chatMessages.appendChild(messageGroup);
        scrollToBottom();
      }
      
      function addBotMessage(text, isHtml = false) {
        const messageGroup = document.createElement("div");
        messageGroup.className = "message-group";
        const content = isHtml ? text : escapeHtml(text).replace(/\n/g, '<br>');
        messageGroup.innerHTML = `
          <div class="message-bot">
            <div class="bot-avatar">
              <div class="avatar-icon">
                <i class="fas fa-robot"></i>
              </div>
              <div class="bot-content">
                <div class="bubble">${content}</div>
              </div>
            </div>
          </div>
        `;
        chatMessages.appendChild(messageGroup);
        scrollToBottom();
      }
      
      let typingElement = null;
      function showTyping() {
        removeTyping();
        typingElement = document.createElement("div");
        typingElement.className = "message-group";
        typingElement.innerHTML = `
          <div class="message-bot">
            <div class="bot-avatar">
              <div class="avatar-icon">
                <i class="fas fa-robot"></i>
              </div>
              <div class="bot-content">
                <div class="typing-indicator">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>
        `;
        chatMessages.appendChild(typingElement);
        scrollToBottom();
      }
      
      function removeTyping() {
        if (typingElement && typingElement.remove) {
          typingElement.remove();
          typingElement = null;
        }
      }
      
      function formatSources(sources) {
        if (!sources || !Array.isArray(sources) || sources.length === 0) return "";
        let html = `<div class="sources"><i class="fas fa-database"></i> <strong>Sources:</strong>`;
        sources.forEach(src => {
          let sourceName = src.source || src.title || "Legal reference";
          let contentSnippet = src.content || src.text || "";
          if (contentSnippet.length > 150) contentSnippet = contentSnippet.substring(0, 150) + "…";
          html += `
            <div class="source">
              <b>📚 ${escapeHtml(sourceName)}</b><br/>
              <small>${escapeHtml(contentSnippet)}</small>
            </div>
          `;
        });
        html += `</div>`;
        return html;
      }
      
      async function sendMessage() {
        const question = input.value.trim();
        if (!question) return;
        
        sendBtn.disabled = true;
        input.disabled = true;
        
        addUserMessage(question);
        input.value = "";
        autoResize();
        showTyping();
        
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({
              question: question,
              session_id: session_id
            })
          });
          
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          
          const data = await response.json();
          removeTyping();
          
          let botReply = data.response || "I'm sorry, I couldn't process that request.";
          addBotMessage(botReply);
          
          if (data.sources && Array.isArray(data.sources) && data.sources.length > 0) {
            const sourcesHtml = formatSources(data.sources);
            addBotMessage(sourcesHtml, true);
          }
          
        } catch (err) {
          console.error(err);
          removeTyping();
          let errorMsg = "⚠️ Connection error. Please check your network and try again.";
          addBotMessage(errorMsg);
        } finally {
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
          autoResize();
        }
      }
      
      input.addEventListener("input", autoResize);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      sendBtn.addEventListener("click", sendMessage);
      
      // Welcome message
      if (chatMessages.children.length === 0) {
        addBotMessage("👋 Hello! I'm Lexi, your AI legal assistant for Uganda. Ask me anything about Ugandan law, rights, legal procedures, or the Constitution. How can I help you today?");
      }
      
      input.focus();
      
      // Handle viewport height on mobile
      function setVH() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
      }
      setVH();
      window.addEventListener('resize', setVH);
    })();
  </script>
</body>
</html>
